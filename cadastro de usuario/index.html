<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Configurações da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Arquivo CSS -->
    <link rel="stylesheet" href="./style.css">

    <title>Cadastro de Usuário</title>

</head>

<body>

    <header>

        <!-- Logo da empresa -->
        <img class="logo" src="./img/logo.png" alt="Logo">

    </header>

    <main>

        <!-- Barra lateral de navegação -->
        <div class="sideBar">

            <!-- Container dos botões de navegação -->
            <div class="containerNavegacao">

                <!-- Botão Dashboard -->
                <div class="btnNavegacao">
                    <p>Dashboard</p>
                </div>

                <!-- Botão Produto -->
                <div class="btnNavegacao">
                    <p>Produto</p>
                </div>

                <!-- Botão Categoria -->
                <div class="btnNavegacao">
                    <p>Categoria</p>
                </div>

                <!-- Botão Tipo -->
                <div class="btnNavegacao">
                    <p>Tipo</p>
                </div>

                <!-- Botão Usuário -->
                <div class="btnNavegacao">
                    <p>Usuário</p>
                </div>

            </div>

            <!-- Botão para sair do sistema -->
            <button class="btnSair">
                Sair
            </button>

        </div>

        <!-- Área principal -->
        <div class="containerCadastro">

            <!-- Card de cadastro -->
            <div class="cardCadastro">

                <!-- Título da página -->
                <h1>Cadastro</h1>

                <!-- Formulário de cadastro -->
                <form>

                    <!-- Campo nome -->
                    <input
                        type="text"
                        placeholder="Nome">

                    <!-- Campo usuário -->
                    <input
                        type="text"
                        placeholder="Usuário">

                    <!-- Campo senha -->
                    <input
                        type="password"
                        placeholder="Senha">

                    <!-- Campo confirmar senha -->
                    <input
                        type="password"
                        placeholder="Confirmar Senha">

                    <!-- Área do botão salvar -->
                    <div class="areaBotao">

                        <!-- Botão salvar -->
                        <button
                            type="submit"
                            class="btnSalvar">

                            Salvar

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </main>

</body>

</html>
