<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Configurações da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Arquivo CSS -->
    <link rel="stylesheet" href="./style.css">

    <title>Login</title>

</head>

<body>

    <!-- Container principal da página -->
    <main>

        <!-- Card de login -->
        <div class="cardLogin">

            <!-- Título da página -->
            <h1>LOGIN</h1>

            <!-- Formulário de login -->
            <form>

                <!-- Campo usuário -->
                <input
                    type="text"
                    placeholder="Usuario">

                <!-- Campo senha -->
                <input
                    type="password"
                    placeholder="Senha">

                <!-- Área do botão -->
                <div class="areaBotao">

                    <!-- Botão entrar -->
                    <button
                        type="submit"
                        class="btnEntrar">

                        Entrar

                    </button>

                </div>

            </form>

        </div>

    </main>

</body>

</html>
